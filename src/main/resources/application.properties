spring.application.name=lexguard

# Carrega segredos locais (copie application-local.properties.example → application-local.properties)
spring.config.import=optional:classpath:application-local.properties

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/lexguard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JWT — defina jwt.secret em application-local.properties ou via variável JWT_SECRET
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Super Admin (criado automaticamente na primeira inicialização)
app.superadmin.username=superadmin
app.superadmin.nome=Super Administrador
app.superadmin.email=admin@lexguard.com.br
